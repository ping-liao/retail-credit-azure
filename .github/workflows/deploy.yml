name: Build and Deploy Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["app/**"]

env:
  ACR_REGISTRY: acrretailcreditrc01.azurecr.io
  IMAGE_NAME: retail-credit-dashboard
  CONTAINER_APP: ca-retail-credit-dashboard
  RESOURCE_GROUP: rg-retail-credit

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
